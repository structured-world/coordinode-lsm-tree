# Standalone head-to-head benchmark crate — NOT part of the main
# `coordinode-lsm-tree` crate's workspace or feature graph. Lives
# here so the main crate's `cargo build --all-features` /
# `cargo clippy --all-features` / docs.rs build do NOT have to
# pull in RocksDB's C dependency tree (libsnappy, liblz4, libbz2,
# librocksdb itself, plus bindgen + libclang). Build / run with:
#
#     cd tools/compare-rocksdb && cargo bench
#
# Each criterion group runs the same workload through this crate
# and through RocksDB side-by-side; results land in
# `tools/compare-rocksdb/target/criterion/`. The gh-pages
# dashboard pipeline consumes those JSON outputs (per #244).
[package]
name = "compare-rocksdb-bench"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
# Local path dep on the main crate. `lz4` is the only feature we
# need from lsm-tree for the harness today; if a future bench
# scenario needs zstd dictionary or encryption, add features here
# without disturbing the main crate's surface.
lsm-tree = { package = "coordinode-lsm-tree", path = "../..", features = ["lz4"] }
# RocksDB binding — the whole reason this crate exists outside the
# main `--all-features` graph. Pinned default-features=false +
# explicit `lz4` to keep the C compile cost manageable.
rocksdb = { version = "0.24", default-features = false, features = ["lz4"] }
criterion = { version = "0.8", features = ["html_reports"] }
tempfile = "3"

[[bench]]
name = "compare"
harness = false
path = "benches/compare.rs"
