name: Release

on:
  release:
    types: created

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      # Job-level `permissions:` overrides the default token scope —
      # every permission not listed here is implicitly `none`. The
      # OIDC handshake (rust-lang/crates-io-auth-action) requires
      # `id-token: write`, and `actions/checkout` needs
      # `contents: read` to fetch the tagged commit; both must be
      # explicit so this workflow keeps working when the repo's
      # default-token policy tightens.
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # cargo publish authenticates via OIDC against crates.io
          # (rust-lang/crates-io-auth-action below); no git config
          # credentials are needed.
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18  # v1.0.5
        id: auth
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
