name: Release

on:
  push:
    branches:
      - main

jobs:
  release-plz:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token (SW Release Bot)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable

      # Step 1: Create or update release PR (version bump + changelog)
      - name: Create release PR
        uses: release-plz/action@064f4d1e36c843611ddf013be726beaa4ad804db  # v0.5.129
        with:
          command: release-pr
          config: .release-plz.toml
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      # Step 2: If version in Cargo.toml > latest tag, create GitHub Release + tag
      # This triggers release.yml → cargo publish via OIDC
      - name: Create GitHub Release
        uses: release-plz/action@064f4d1e36c843611ddf013be726beaa4ad804db  # v0.5.129
        with:
          command: release
          config: .release-plz.toml
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
