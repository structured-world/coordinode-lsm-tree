name: Dependabot Auto-Merge

on:
  # `check_suite: completed` ensures we only react AFTER all required checks
  # finish. The previous `pull_request: opened` trigger fired immediately on
  # PR open, before `test`/`lint` even started — so `gh pr merge --auto`
  # bypassed them when branch protection didn't list them as required.
  # Incident: PR #243 (rand_chacha 0.3 → 0.10) auto-merged with test SKIPPED
  # and lint FAILED, breaking `--features encryption` on main — see #246.
  check_suite:
    types: [completed]

permissions:
  pull-requests: write
  contents: read
  checks: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only react to check suites that came from a dependabot PR head SHA,
    # AND only after every check on that SHA succeeded.
    if: >-
      github.event.check_suite.conclusion == 'success' &&
      github.event.check_suite.pull_requests[0] != null &&
      github.event.sender.login == 'dependabot[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      # Defence-in-depth: re-verify ALL check runs on the head SHA succeeded.
      # `check_suite.conclusion == 'success'` covers the suite that just
      # finished, but a PR may have multiple suites (CodeQL, ours, third-party).
      # Block merge unless every visible check run is `success`.
      - name: Verify all checks on head SHA are green
        id: checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.check_suite.head_sha }}
        run: |
          set -euo pipefail
          mapfile -t conclusions < <(
            gh api "repos/${{ github.repository }}/commits/$HEAD_SHA/check-runs" \
              --jq '.check_runs[] | select(.name != "auto-merge") | .conclusion // "pending"'
          )
          for c in "${conclusions[@]}"; do
            if [ "$c" != "success" ] && [ "$c" != "skipped" ] && [ "$c" != "neutral" ]; then
              echo "Check run conclusion '$c' is not success/skipped/neutral; aborting auto-merge."
              exit 1
            fi
          done

      - name: Generate App Token
        id: app-token
        if: steps.metadata.outputs.update-type == 'version-update:semver-minor' || steps.metadata.outputs.update-type == 'version-update:semver-patch'
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}

      - name: Approve and merge minor/patch updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-minor' || steps.metadata.outputs.update-type == 'version-update:semver-patch'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.check_suite.pull_requests[0].number }}
        run: |
          gh pr review --approve "$PR_NUMBER"
          # All checks have already passed (verified above), so squash-merge
          # immediately rather than `--auto` queueing.
          gh pr merge --squash "$PR_NUMBER"
