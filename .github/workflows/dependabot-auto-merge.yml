name: Dependabot Auto-Merge

# `workflow_run` is the only trigger that actually fires after a GitHub-Actions
# check suite completes. `check_suite: completed` does NOT fire when the suite
# was produced by GitHub Actions (recursion-prevention rule in the GitHub
# Actions event model) — so the previous wiring would have silently never
# matched. See incident: PR #243 (rand_chacha 0.3 → 0.10) auto-promoted with
# `test: SKIPPED`, `lint: FAILURE` because the auto-promote workflow ran on
# `pull_request: opened`, before checks had a chance to run, and `gh pr m...`
# `--auto` only respects branch-protection-required checks.
on:
  workflow_run:
    workflows: ["CoordiNode CI"]
    types: [completed]

permissions:
  pull-requests: write
  contents: read
  checks: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Run only when the CI run completed successfully on a dependabot PR.
    # `workflow_run.actor` is the user that triggered the source workflow run;
    # for dependabot PRs that's `dependabot[bot]`. Sister-bot updates from
    # other actors won't match.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]' &&
      github.event.workflow_run.pull_requests[0] != null

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      # Defence-in-depth: re-verify EVERY check run on the head SHA succeeded.
      # `workflow_run.conclusion == 'success'` only covers the CoordiNode CI
      # workflow; a PR may have parallel suites (CodeQL, third-party, codecov).
      # Block promotion unless every visible check run on the SHA concluded
      # `success`, `skipped`, or `neutral` (no `failure`, `cancelled`, `pending`).
      #
      # `--paginate` is mandatory: the check-runs endpoint defaults to one
      # page, so without it failing checks beyond the first 30 are invisible.
      - name: Verify all checks on head SHA are green
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          mapfile -t conclusions < <(
            gh api --paginate \
              "repos/${{ github.repository }}/commits/$HEAD_SHA/check-runs" \
              --jq '.check_runs[] | select(.name != "auto-merge") | .conclusion // "pending"'
          )
          if [ ${#conclusions[@]} -eq 0 ]; then
            echo "No check runs found on $HEAD_SHA — aborting."
            exit 1
          fi
          for c in "${conclusions[@]}"; do
            case "$c" in
              success|skipped|neutral) ;;
              *)
                echo "Check run conclusion '$c' is not success/skipped/neutral on $HEAD_SHA."
                exit 1
                ;;
            esac
          done

      - name: Generate App Token
        id: app-token
        if: steps.metadata.outputs.update-type == 'version-update:semver-minor' || steps.metadata.outputs.update-type == 'version-update:semver-patch'
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}

      - name: Approve and promote minor/patch updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-minor' || steps.metadata.outputs.update-type == 'version-update:semver-patch'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          gh pr review --approve "$PR_NUMBER"
          # All required checks have already passed (verified above), so promote
          # immediately rather than queueing via `--auto`.
          gh pr merge --squash "$PR_NUMBER"
