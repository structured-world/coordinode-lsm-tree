[store]
dir = "target/nextest"

[profile.default]
slow-timeout = { period = "10s", terminate-after = 6 }
fail-fast = true

# Property tests may take longer than unit tests (proptest runs N cases).
# CI uses PROPTEST_CASES=32; local runs default to 256.
# Budget: 120s × 8 = 960s (16 min) — enough for 256 local cases.
# Measured worst case: prop_range_tombstone ~700s with 256 cases on M-series Mac.
[[profile.default.overrides]]
filter = "test(prop_)"
slow-timeout = { period = "120s", terminate-after = 8 }

# CI profile: retries for flaky tests, JUnit XML output, longer timeouts.
[profile.ci]
retries = 2
fail-fast = false
slow-timeout = { period = "120s", terminate-after = 3 }
status-level = "all"
final-status-level = "flaky"

[profile.ci.junit]
path = "target/nextest/ci/junit.xml"
store-success-output = false
store-failure-output = true

[[profile.ci.overrides]]
filter = "test(prop_)"
slow-timeout = { period = "120s", terminate-after = 4 }
