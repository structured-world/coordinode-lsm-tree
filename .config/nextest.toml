[store]
dir = "target/nextest"

[profile.default]
slow-timeout = { period = "10s", terminate-after = 6 }
fail-fast = true

# Property tests run 32 cases by default (same as CI).
# Override with PROPTEST_CASES=256 for thorough local runs.
# Budget: 30s × 4 = 120s — enough for 32 cases with I/O.
[[profile.default.overrides]]
filter = "test(prop_)"
slow-timeout = { period = "30s", terminate-after = 4 }

# CI profile: retries for flaky tests, JUnit XML output, longer timeouts.
[profile.ci]
retries = 2
fail-fast = false
slow-timeout = { period = "120s", terminate-after = 3 }
status-level = "all"
final-status-level = "flaky"

[profile.ci.junit]
path = "junit.xml"
store-success-output = false
store-failure-output = true

[[profile.ci.overrides]]
filter = "test(prop_)"
slow-timeout = { period = "120s", terminate-after = 4 }
